<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Claude × Influencer Partnership</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f7f6f3;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px;}
#app{width:100%;max-width:560px;}
#chat-card{background:#fff;border-radius:20px;overflow:hidden;box-shadow:0 2px 20px rgba(0,0,0,0.08);}
#chat-hdr{background:#1a1a1a;padding:16px 20px;display:flex;align-items:center;gap:12px;}
.brand-logo{width:38px;height:38px;border-radius:50%;background:#fff;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#1a1a1a;flex-shrink:0;}
.hdr-name{color:#fff;font-size:15px;font-weight:600;}
.hdr-role{color:#888;font-size:12px;}
.status-dot{width:8px;height:8px;border-radius:50%;background:#4ade80;margin-left:auto;flex-shrink:0;}
#msgs{height:440px;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:14px;background:#fff;}
#msgs::-webkit-scrollbar{width:4px;}
#msgs::-webkit-scrollbar-thumb{background:#e0e0e0;border-radius:2px;}
.msg{display:flex;gap:8px;max-width:88%;}
.msg.brand{align-self:flex-start;}
.msg.user{align-self:flex-end;flex-direction:row-reverse;}
.msg-ava{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0;margin-top:16px;}
.msg.brand .msg-ava{background:#1a1a1a;color:#fff;}
.msg.user .msg-ava{background:#e8f0fe;color:#3b5fc0;}
.msg-body{display:flex;flex-direction:column;gap:3px;}
.msg.user .msg-body{align-items:flex-end;}
.msg-name{font-size:11px;color:#aaa;padding:0 3px;}
.bubble{padding:10px 14px;border-radius:16px;font-size:14px;line-height:1.65;word-break:break-word;}
.msg.brand .bubble{background:#f5f5f3;color:#1a1a1a;border-bottom-left-radius:3px;border:1px solid #eee;}
.msg.user .bubble{background:#1a1a1a;color:#fff;border-bottom-right-radius:3px;}
.option-btns{display:flex;flex-wrap:wrap;gap:7px;margin-top:8px;}
.opt-btn{padding:7px 14px;border-radius:20px;border:1.5px solid #1a1a1a;background:#fff;font-size:13px;color:#1a1a1a;cursor:pointer;font-family:inherit;transition:all 0.15s;}
.opt-btn:hover{background:#1a1a1a;color:#fff;}
.dots-wrap{display:flex;align-items:center;gap:5px;padding:10px 14px;background:#f5f5f3;border-radius:16px;border-bottom-left-radius:3px;border:1px solid #eee;width:fit-content;}
.dots-wrap span{width:6px;height:6px;border-radius:50%;background:#aaa;animation:bop 1.2s infinite;}
.dots-wrap span:nth-child(2){animation-delay:.2s;}
.dots-wrap span:nth-child(3){animation-delay:.4s;}
@keyframes bop{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}
.hint{font-size:11px;color:#bbb;text-align:center;padding:5px 0 1px;background:#fff;}
#inp-area{padding:12px 16px;border-top:1px solid #f0f0f0;display:flex;gap:8px;align-items:flex-end;background:#fff;}
#txt-inp{flex:1;border:1.5px solid #e8e8e8;border-radius:20px;padding:9px 15px;font-size:14px;font-family:inherit;resize:none;max-height:90px;outline:none;line-height:1.4;color:#1a1a1a;background:#fafaf8;}
#txt-inp:focus{border-color:#bbb;}
#txt-inp::placeholder{color:#bbb;}
#snd{width:38px;height:38px;border-radius:50%;border:none;background:#1a1a1a;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:opacity 0.15s;}
#snd:hover{opacity:0.75;}
#snd:disabled{opacity:0.25;cursor:not-allowed;}
</style>
</head>
<body>
<div id="app">
  <div id="chat-card">
    <div id="chat-hdr">
      <div class="brand-logo">C</div>
      <div>
        <div class="hdr-name">Alex — Brand Partnerships</div>
        <div class="hdr-role">Claude by Anthropic</div>
      </div>
      <div class="status-dot"></div>
    </div>
    <div id="msgs"></div>
    <div class="hint">You're the influencer · Enter to send</div>
    <div id="inp-area">
      <textarea id="txt-inp" placeholder="Type your reply..." rows="1"></textarea>
      <button id="snd" aria-label="Send">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
      </button>
    </div>
  </div>
</div>
<script>
const API_KEY = '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';
const SYSTEM = `You are Alex, a Partnerships Manager at Claude (an AI assistant app by Anthropic). You are reaching out cold to a social media influencer to explore a brand collaboration. Be warm, professional, enthusiastic, and knowledgeable about the influencer industry and compensation rates.

CONVERSATION FLOW:
1. Introduce yourself, say you came across their content and loved it, express interest in a collab
2. Ask what platforms they're active on
3. Ask for their follower count and engagement metrics
4. Ask what type of partnership they'd prefer — present options as a bullet list
5. Propose compensation based on their tier

COMPENSATION TIERS:
- Nano (1K-10K followers): Free PR gifting + $50-$200 per approved post
- Micro (10K-50K): $200-$800 per post + gifting
- Mid-tier (50K-500K): $800-$3,000 per post
- Macro (500K-1M): $3,000-$8,000 per post
- Mega (1M+): $10,000-$50,000+ per post

PARTNERSHIP OPTIONS (present as bullet list when asking):
- Sponsored post / reel / video
- Brand ambassador (monthly retainer)
- Product collaboration
- Affiliate / commission deal
- Event appearance
- PR gifting only

RULES:
- Keep replies to 2-4 sentences
- Ask ONE question at a time
- Present partnership options as a clean bullet list so they become clickable buttons
- Give specific compensation ranges based on their follower count
- You can negotiate up to 20% above your first offer if pushed
- If asked about the product: Claude is an AI assistant app, partnership = promoting Claude authentically
- Never break character`;

let history = [];

function ts(){return new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});}

function addMsg(role, text, opts){
  const msgs=document.getElementById('msgs');
  const isB=role==='brand';
  const d=document.createElement('div');
  d.className='msg '+(isB?'brand':'user');
  d.innerHTML='<div class="msg-ava">'+(isB?'A':'Y')+'</div><div class="msg-body"><div class="msg-name">'+(isB?'Alex · '+ts():'You · '+ts())+'</div><div class="bubble">'+text.replace(/\n/g,'<br>')+'</div></div>';
  msgs.appendChild(d);
  if(opts&&opts.length){
    const body=d.querySelector('.msg-body');
    const wrap=document.createElement('div');
    wrap.className='option-btns';
    opts.forEach(function(o){
      const btn=document.createElement('button');
      btn.className='opt-btn';
      btn.textContent=o;
      btn.onclick=function(){
        wrap.querySelectorAll('.opt-btn').forEach(function(b){b.disabled=true;b.style.opacity='0.4';});
        btn.style.opacity='1';btn.style.background='#1a1a1a';btn.style.color='#fff';
        setTimeout(function(){wrap.remove();addMsg('user',o);sendToApi(o);},150);
      };
      wrap.appendChild(btn);
    });
    body.appendChild(wrap);
  }
  msgs.scrollTop=msgs.scrollHeight;
}

function showDots(){
  const msgs=document.getElementById('msgs');
  const d=document.createElement('div');
  d.id='typing';d.className='msg brand';
  d.innerHTML='<div class="msg-ava">A</div><div class="msg-body"><div class="msg-name">Alex · '+ts()+'</div><div class="dots-wrap"><span></span><span></span><span></span></div></div>';
  msgs.appendChild(d);msgs.scrollTop=msgs.scrollHeight;
}
function hideDots(){const t=document.getElementById('typing');if(t)t.remove();}

function parseOpts(text){
  const lines=text.split('\n');
  const opts=[];
  const rest=[];
  lines.forEach(function(l){
    const m=l.match(/^[\-\*•]\s*(.+)/);
    if(m&&m[1].length<70&&opts.length<6)opts.push(m[1].trim());
    else rest.push(l);
  });
  return{text:rest.join('\n').trim()||text,opts:opts};
}

async function sendToApi(userText){
  history.push({role:'user',content:userText});
  showDots();
  document.getElementById('snd').disabled=true;
  try{
    const r=await fetch('https://api.groq.com/openai/v1/chat/completions',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+API_KEY},
      body:JSON.stringify({model:'llama-3.3-70b-versatile',messages:[{role:'system',content:SYSTEM}].concat(history),max_tokens:300,temperature:0.85})
    });
    const data=await r.json();
    hideDots();
    if(data.error){addMsg('brand','Error: '+data.error.message);document.getElementById('snd').disabled=false;return;}
    const txt=data.choices&&data.choices[0]&&data.choices[0].message&&data.choices[0].message.content;
    if(!txt){addMsg('brand','No response — please try again.');document.getElementById('snd').disabled=false;return;}
    history.push({role:'assistant',content:txt});
    const parsed=parseOpts(txt);
    addMsg('brand',parsed.text,parsed.opts);
  }catch(e){
    hideDots();
    addMsg('brand','Connection error — please refresh and try again.');
  }
  document.getElementById('snd').disabled=false;
  document.getElementById('txt-inp').focus();
}

async function init(){
  showDots();
  try{
    const opening='Start the conversation. Introduce yourself as Alex from Claude Partnerships. Say you came across their content and loved it. Warm, natural, 2 sentences max. End with a simple open question.';
    const r=await fetch('https://api.groq.com/openai/v1/chat/completions',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+API_KEY},
      body:JSON.stringify({model:'llama-3.3-70b-versatile',messages:[{role:'system',content:SYSTEM},{role:'user',content:opening}],max_tokens:150,temperature:0.9})
    });
    const data=await r.json();
    hideDots();
    const txt=data.choices&&data.choices[0].message.content;
    const fallback="Hey! I'm Alex from Claude's partnerships team — I came across your content and honestly loved it. Would you be open to chatting about a potential collab?";
    history.push({role:'user',content:opening});
    history.push({role:'assistant',content:txt||fallback});
    addMsg('brand',txt||fallback);
  }catch(e){
    hideDots();
    const fallback="Hey! I'm Alex from Claude's partnerships team — I came across your content and honestly loved it. Would you be open to chatting about a potential collab?";
    history.push({role:'assistant',content:fallback});
    addMsg('brand',fallback);
  }
}

document.getElementById('snd').addEventListener('click',function(){
  const inp=document.getElementById('txt-inp');
  const t=inp.value.trim();
  if(!t)return;
  addMsg('user',t);
  inp.value='';inp.style.height='auto';
  sendToApi(t);
});
document.getElementById('txt-inp').addEventListener('keydown',function(e){
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();document.getElementById('snd').click();}
});
document.getElementById('txt-inp').addEventListener('input',function(){
  this.style.height='auto';
  this.style.height=Math.min(this.scrollHeight,90)+'px';
});

init();
</script>
</body>
</html>
